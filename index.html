<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    form {
      max-width: 400px;
      margin: auto;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    .error {
      color: red;
      font-size: 0.875rem;
      margin-top: 5px;
    }
  </style>
</head>
<body>
    <form id="registrationForm">
      <h1>Registration Form</h1>
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name">
      <div id="nameError" class="error"></div>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="text" id="email" name="email">
      <div id="emailError" class="error"></div>
    </div>
    <div class="form-group">
      <label for="phone">Phone</label>
      <input type="text" id="phone" name="phone">
      <div id="phoneError" class="error"></div>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password">
      <div id="passwordError" class="error"></div>
    </div>
    <button type="button" onclick="formHandler.validateAndSubmit()">Submit</button>
  </form>

  <script>
    class FormHandler {
      constructor(formId) {
        this.form = document.getElementById(formId);
        this.errorMessages = {};
      }

      validateField(fieldName, value) {
        switch (fieldName) {
          case 'name':
            if (!value || value.length < 3) {
              return 'Name must be at least 3 characters.';
            }
            break;
          case 'email':
            const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
            if (!value || !emailPattern.test(value)) {
              return 'Enter a valid email address.';
            }
            break;
          case 'phone':
            const phonePattern = /^[0-9]{10,15}$/;
            if (!value || !phonePattern.test(value)) {
              return 'Enter a valid phone number (10-15 digits).';
            }
            break;
          case 'password':
            if (!value || value.length < 6) {
              return 'Password must be at least 6 characters.';
            }
            break;
          default:
            return '';
        }
        return '';
      }

      validateAllFields() {
        const fields = ['name', 'email', 'phone', 'password'];
        let isValid = true;

        fields.forEach(field => {
          const input = document.getElementById(field);
          const errorElement = document.getElementById(`${field}Error`);
          const errorMessage = this.validateField(field, input.value.trim());

          if (errorMessage) {
            errorElement.textContent = errorMessage;
            this.errorMessages[field] = errorMessage;
            isValid = false;
          } else {
            errorElement.textContent = '';
            delete this.errorMessages[field];
          }
        });

        return isValid;
      }

      saveDataToLocalStorage() {
        const formData = {
          name: document.getElementById('name').value.trim(),
          email: document.getElementById('email').value.trim(),
          phone: document.getElementById('phone').value.trim(),
          password: document.getElementById('password').value.trim(),
        };
        localStorage.setItem('formData', JSON.stringify(formData));
      }

      validateAndSubmit() {
        const isValid = this.validateAllFields();

        if (isValid) {
          this.saveDataToLocalStorage();
          window.location.href = 'profile.html';
        }
      }
    }

    const formHandler = new FormHandler('registrationForm');
  </script>
</body>
</html>
